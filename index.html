<!DOCTYPE html>
<html>
<head>
    <title>NLP News Summarizer</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; margin: 0; }
        header { background: #222; color: white; padding: 15px; text-align: center; font-size: 22px; }
        .container { width: 80%; margin: auto; margin-top: 20px; }
        select, button { padding: 8px 12px; margin-right: 5px; }
        button { background: #333; color: white; border: none; cursor: pointer; }
        button:hover { background: #555; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .cluster { font-size: 12px; color: gray; }
    </style>
</head>

<body>

<header>📚 NLP News Summarization & Clustering</header>

<div class="container">

<select id="domain">
    <option value="t20">T20 Cricket</option>
    <option value="trade">Trade Wars</option>
    <option value="quantum">Quantum</option>
    <option value="space">Space</option>
    <option value="nobel">Nobel</option>
</select>

<button onclick="fetchNews()">Analyze</button>

<div id="clusterInfo"></div>
<div id="clusterControls"></div>
<div id="output"></div>

</div>

<script>

const BACKEND_URL = "https://news-summarizer-6o3b.onrender.com";

async function fetchNews() {
    const domain = document.getElementById("domain").value;
    const output = document.getElementById("output");

    output.innerHTML = "Loading...";

    try {
        const res = await fetch(`${BACKEND_URL}/get-news?domain=${domain}`);
        const data = await res.json();

        if (!Array.isArray(data)) {
            output.innerHTML = "API Error";
            return;
        }

        window.newsData = data;

        document.getElementById("clusterInfo").innerHTML =
            `<h3>Total Clusters: ${data[0].total_clusters}</h3>`;

        renderNews(data);

    } catch (err) {
        output.innerHTML = "Server Error";
    }
}

function renderNews(data) {
    const output = document.getElementById("output");
    let html = "";

    data.forEach(item => {
        html += `
        <div class="card">
            <div class="cluster">Cluster ${item.cluster}</div>
            <small>${item.date}</small>
            <p><b>${item.source}</b></p>
            <p>${item.summary}</p>
            <button onclick="window.open('${item.url}')">Read More</button>
        </div>
        `;
    });

    output.innerHTML = html;
}

</script>

</body>
</html>
